{% extends "company_structure/index.html" %}

{% block title %} <title>New Area</title> {% endblock %}

{% block cards %} {% endblock %}

{% block content %}

    <div class="container mt-5 d-flex justify-content-center">
        <div class="card card-custom p-4 w-50">
            <h3 class="text-center mb-4">New Area</h3>
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    {{ form.name }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Area ID</label>
                    {{ form.area_id }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Lead</label>
                    {{ form.lead }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Employee Count</label>
                    {{ form.employees }}
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'area_list' %}" class="btn btn-secondary">
                        Back
                    </a>

                    <button type="submit" class="btn btn-custom">
                        Add
                    </button>
                </div>
            </form>
        </div>
    </div>

{% endblock %}
